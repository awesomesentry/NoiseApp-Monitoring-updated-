<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Login — Smart Classroom Noise Monitor</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="traffic-dots">
        <span class="g" title="Green"></span>
        <span class="y" title="Yellow"></span>
        <span class="r" title="Red"></span>
      </div>
      <h1>Admin Dashboard</h1>
      <p class="subtitle">Administrator sign in — full system access</p>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <p class="error-msg" id="login-error">Invalid username or password.</p>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>
      <p class="login-footer-link" style="margin-top:1rem">
        Are you a teacher? <a href="teacher-login.html">Go to Teacher Portal</a>
      </p>
    </div>
  </div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (getSession()) window.location.href = "app.html";
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const err = document.getElementById("login-error");
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      if (login(user, pass)) {
        await new Promise(r => setTimeout(r, 200));
        window.location.href = "app.html";
      } else {
        err.classList.add("visible");
      }
    });
  </script>
</body>
</html>
